[general]
#Período de refresco de la imagen radar (milisegundos)
RefreshPeriod=100
#Timeout del tabular (segundos)
TimeoutTab=0
#Tiempo para refrescar imagen blancos ADSB
RefreshPeriodADSB=5000
#Lenguaje en que se mostrara la consola
#Idioma=ingles


[conexion]
#Direccion IP de escucha
IP=0.0.0.0
#Puerto UDP de escucha
Puerto=16661

[tail2ax]
#Path del demonio
#daemon=/home/administrador/tail2ax/tail2axd

[radar]
#Antenna Rotation Period - Período de Rotación de la Antena (milisegundos)
ARP=1500.000
#Frecuencia de muestreo del ADC del radar (Hz)
FreqMuestreo=40000000.
#Identificador radar
IDRadar=FPS
#System Area Code - Código de Área del Sistema
SAC=227
#System Identification Code - Código de Identificación del Sistema
SIC=6
#Latitud del radar (grados)
LatRadar=-41.12340
#Longitud del radar (grados)
LonRadar=-71.24360

[adsb]
#System Area Code - Código de Área del Sistema
SAC=227
#System Identification Code - Código de Identificación del Sistema
SIC=6

[proyeccion]
#Centro Latitud (grados)
CentroLat=-38.00000
#Centro Longitud (grados)
CentroLon=-66.00000
#Paralela standard 1 (grados)
ParStd1=-26.00000
#Paralela standard 2 (grados)
ParStd2=-50.00000

[mapas]
#Archivo de mapa en formato DXF
ArchivoDeMapa=mapa.dxf

[simbolos]
#Tamaño punto historico (píxeles)
TamPuntHist=3
#Ancho del vector velocidad (píxeles)
AnchVectVel=1
#Ancho herramientas de medicion (píxeles)
AnchHDM=2
#Largo de las marcas del vector velocidad (píxeles)
LarMarcVel=4

[zoom]
#Zoom maximo (millas náuticas)
ZoomMax=1000.0000
#Cantidad de decimales a mostrar para el nivel de zoom
ZoomDec=3

[puntos]
#Historia maxima de puntos a mostrar (segundos)
PointHistMax=36000

